<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCD2 Quest Journal</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>
body{
font-family:"MedievalSharp",serif;
}
</style>

</head>

<body class="bg-amber-50 dark:bg-gray-900 min-h-screen">

<header class="sticky top-0 bg-amber-800 text-amber-100 p-4 shadow-lg z-10">
<div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-3">

<h1 class="text-2xl md:text-3xl font-bold">
⚔ KCD2 Quest Journal
</h1>

<div class="flex flex-wrap gap-2">

<input id="search"
class="px-3 py-1 rounded text-black"
placeholder="Search quest"/>

<select id="regionFilter" class="px-2 py-1 rounded text-black">
<option value="all">All Regions</option>
</select>

<select id="filter" class="px-2 py-1 rounded text-black">
<option value="all">All</option>
<option value="missable">Missable</option>
<option value="trophy">Trophy</option>
</select>

<button id="darkToggle"
class="bg-gray-700 px-2 py-1 rounded">
🌙
</button>

<button id="reset"
class="bg-red-700 px-2 py-1 rounded">
Reset
</button>

</div>
</div>

<div class="max-w-6xl mx-auto mt-3">
<div class="w-full bg-gray-300 h-3 rounded">
<div id="progressBar" class="bg-green-600 h-3 rounded w-0"></div>
</div>

<p id="progressText" class="text-sm mt-1"></p>
</div>

</header>

<main id="quests"
class="max-w-6xl mx-auto p-4 grid gap-6">
</main>

<script src="app.js"></script>

</body>
</html>
